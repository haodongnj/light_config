name: Build & Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  build-and-test:
    name: ${{ matrix.name }}
    runs-on: ubuntu-22.04
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: GCC 11
            cc: gcc-11
            cxx: g++-11
          - name: Clang 14
            cc: clang-14
            cxx: clang++-14

    steps:
      - uses: actions/checkout@v4

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential cmake ${{ matrix.cc }}

      - name: Configure
        run: cmake -B build -S . -DCMAKE_BUILD_TYPE=Debug
        env:
          CC: ${{ matrix.cc }}
          CXX: ${{ matrix.cxx }}

      - name: Build
        run: cmake --build build

      - name: Test
        run: cd build && ctest --output-on-failure
