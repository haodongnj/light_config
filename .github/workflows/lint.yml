name: Lint

on:
  push:
    branches: ['*']
  pull_request:
    branches: [master]

jobs:
  clang-format:
    name: clang-format check
    runs-on: ubuntu-22.04
    continue-on-error: true

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-14

      - name: Check formatting
        run: |
          find include examples tests -name '*.cpp' -o -name '*.hpp' -o -name '*.h' | xargs clang-format-14 --dry-run --Werror
