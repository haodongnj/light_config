name: Lint

on:
  push:
    branches: ['**']
  pull_request:
    branches: [master]

jobs:
  clang-format:
    name: clang-format check
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install clang-format
        run: |
          sudo apt-get update
          sudo apt-get install -y clang-format-14

      - name: Check formatting
        run: |
          # Parenthesize the -name group so -print binds to the whole OR
          # expression.  Without the parens, GNU find's implicit -print
          # binds only to the last -name term ('*.h'), so the repo's .cpp
          # and .hpp files were never checked — a silent no-op.
          find include examples tests \( -name '*.cpp' -o -name '*.hpp' -o -name '*.h' \) -print \
            | xargs clang-format-14 --dry-run --Werror
